name = "project-setup-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
#   APP_ID           — GitHub App ID
#   PRIVATE_KEY      — GitHub App private key (PEM)
#   WEBHOOK_SECRET   — Webhook secret for signature verification

[vars]
DEFAULT_TEMPLATE = "ai-review"
TEMPLATES_REPO = "Alpha-Bet-New/github-project-templates"
TEMPLATE_PROJECT_ID = "PVT_kwDOCx99fM4BSGlz"      # FV2.0 — source template project to copy
TEMPLATE_PROJECT_ORG = "Alpha-Bet-New"              # Org that owns the template project
