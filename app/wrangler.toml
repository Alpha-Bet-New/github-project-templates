name = "project-setup-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
#   APP_ID           — GitHub App ID
#   PRIVATE_KEY      — GitHub App private key (PEM)
#   WEBHOOK_SECRET   — Webhook secret for signature verification

[vars]
DEFAULT_TEMPLATE = "ai-review"
TEMPLATES_REPO = "Alpha-Bet-New/github-project-templates"
# Per-org template project IDs (JSON map: org login → project node ID)
# Each org needs its own template project since copyProjectV2 requires same-org access
TEMPLATE_PROJECTS = '{"Alpha-Bet-New":"PVT_kwDOCx99fM4BSGlz","AI-Agents-Misc":"PVT_kwDODtX-dc4BSKRi"}'
