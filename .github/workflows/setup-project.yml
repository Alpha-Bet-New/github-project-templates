name: Setup Project

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'GitHub Project V2 ID (e.g., PVT_kwDOCx99fM4BSGlz)'
        required: true
        type: string
      template:
        description: 'Template to apply'
        required: true
        type: choice
        options:
          - ai-review
      target_repo:
        description: 'Target repo to save generated IDs (e.g., Alpha-Bet-New/fair-value-ml). Leave empty to skip.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout templates repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run setup script
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ADMIN_TOKEN }}
        run: |
          ./scripts/setup-project.sh "${{ inputs.project_id }}" "${{ inputs.template }}" --output generated-ids.json

      - name: Upload generated IDs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-fields
          path: generated-ids.json

      - name: Push project config to target repo
        if: inputs.target_repo != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ADMIN_TOKEN }}
        run: |
          # Clone target repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ inputs.target_repo }}.git" target-repo
          cd target-repo

          # Copy generated IDs + template README (field definitions)
          mkdir -p .github
          cp ../generated-ids.json .github/project-fields.json
          cp ../templates/${{ inputs.template }}/fields.json .github/project-template.json
          cp ../templates/${{ inputs.template }}/README.md .github/PROJECT_FIELDS.md

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/project-fields.json .github/project-template.json .github/PROJECT_FIELDS.md
          git diff --cached --quiet || {
            git commit -m "Add project config from ${{ inputs.template }} template

          - project-fields.json: runtime field/option IDs for GraphQL
          - project-template.json: field schema with descriptions
          - PROJECT_FIELDS.md: human-readable field reference

          Generated by setup-project workflow.
          Project: ${{ inputs.project_id }}
          Template: ${{ inputs.template }}"
            git push
          }

      - name: Summary
        run: |
          echo "## Project Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project ID:** \`${{ inputs.project_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Template:** ${{ inputs.template }}" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ inputs.target_repo }}" ]]; then
            echo "- **Generated IDs pushed to:** ${{ inputs.target_repo }}/.github/project-fields.json" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Generated IDs:** Download from artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Field IDs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat generated-ids.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Custom fields must be manually added to View 1 in the GitHub Projects UI." >> $GITHUB_STEP_SUMMARY
